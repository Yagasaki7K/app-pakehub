name: Install Linux Dependencies
description: Installs build dependencies for Linux

runs:
  using: composite
  steps:
    - name: Install packages
      shell: bash
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential \
          libssl-dev \
          libgtk-3-dev \
          libwebkit2gtk-4.1-dev \
          libayatana-appindicator3-dev \
          librsvg2-dev \
          libpango1.0-dev \
          libcairo2-dev