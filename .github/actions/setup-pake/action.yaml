name: Setup Pake Build Environment
description: Sets up Node.js and Rust for Pake builds with caching

inputs:
  pake-version:
    description: Pake CLI version (used for caching)
    required: false
    default: 3.14.0

runs:
  using: composite
  steps:
    - name: Setup Node.js with cache
      uses: actions/setup-node@v4
      with:
        node-version: 22
        cache: npm

    - name: Setup Rust toolchain
      uses: dtolnay/rust-toolchain@stable
      with:
        toolchain: stable

    - name: Cache Pake CLI installation
      uses: actions/cache@v4
      with:
        path: ~/.npm
        key: pake-${{ inputs.pake-version }}-${{ runner.os }}
        restore-keys: pake-${{ runner.os }}-