name: Setup Pake Build Environment
description: Sets up Node.js, Rust, and Pake CLI

inputs:
  pake-version:
    description: Pake CLI version
    required: false
    default: 3.14.0

runs:
  using: composite
  steps:
    - name: Setup Node.js
      uses: actions/setup-node@v5
      with:
        node-version: 22
        cache: npm

    - name: Setup Rust toolchain
      uses: dtolnay/rust-toolchain@stable
      with:
        toolchain: stable