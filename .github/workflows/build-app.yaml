name: Build Application

on:
  workflow_dispatch:
    inputs:
      name:
        description: Application name
        required: true
        type: string
      url:
        description: Application URL
        required: true
        type: string
      slug:
        description: Application slug
        required: true
        type: string
  workflow_call:
    inputs:
      name:
        description: Application name
        required: true
        type: string
      url:
        description: Application URL
        required: true
        type: string
      slug:
        description: Application slug
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: build-${{ inputs.slug }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-windows:
    name: Build Windows MSI
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup build environment
        uses: ./.github/actions/setup-pake
        with:
          pake-ref: 078fab3fc7b206bf8128dd9eb73ca88e76d34db4
          pake-repo: tw93/Pake
          pake-package: pake-cli
          pake-bin: pake

      - name: Prepare artifact directory
        shell: bash
        run: mkdir -p artifacts/windows

      - name: Build Windows installer
        shell: bash
        run: |
          # Pake generates .msi by default on Windows
          $HOME/.pake-install/node_modules/.bin/pake "${{ inputs.url }}" \
            --name "${{ inputs.slug }}"

      - name: Collect and upload artifact
        shell: bash
        run: |
          set -euo pipefail
          SLUG="${{ inputs.slug }}"
          TARGET_DIR="artifacts/windows"
          MSI=$(find . -name "*.msi" | head -1)
          if [ -z "$MSI" ]; then
            echo "❌ No .msi found"
            exit 1
          fi
          cp "$MSI" "$TARGET_DIR/${SLUG}.msi"
          echo "✅ Collected $MSI -> $TARGET_DIR/${SLUG}.msi"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.slug }}-windows
          path: artifacts/windows/${{ inputs.slug }}.msi
          if-no-files-found: error

  build-linux:
    name: Build Linux DEB
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup build environment
        uses: ./.github/actions/setup-pake
        with:
          pake-ref: 078fab3fc7b206bf8128dd9eb73ca88e76d34db4
          pake-repo: tw93/Pake
          pake-package: pake-cli
          pake-bin: pake

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libssl-dev libgtk-3-dev \
            libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev \
            libpango1.0-dev libcairo2-dev

      - name: Prepare artifact directory
        run: mkdir -p artifacts/linux

      - name: Build Linux installer
        run: |
          # Pake generates .deb by default on Linux
          $HOME/.pake-install/node_modules/.bin/pake "${{ inputs.url }}" \
            --name "${{ inputs.slug }}"

      - name: Collect and upload artifact
        shell: bash
        run: |
          set -euo pipefail
          SLUG="${{ inputs.slug }}"
          TARGET_DIR="artifacts/linux"
          DEB=$(find . -name "*.deb" | head -1)
          if [ -z "$DEB" ]; then
            echo "❌ No .deb found"
            exit 1
          fi
          cp "$DEB" "$TARGET_DIR/${SLUG}.deb"
          echo "✅ Collected $DEB -> $TARGET_DIR/${SLUG}.deb"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.slug }}-linux
          path: artifacts/linux/${{ inputs.slug }}.deb
          if-no-files-found: error

  build-macos:
    name: Build macOS DMG
    runs-on: macos-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup build environment
        uses: ./.github/actions/setup-pake
        with:
          pake-ref: 078fab3fc7b206bf8128dd9eb73ca88e76d34db4
          pake-repo: tw93/Pake
          pake-package: pake-cli
          pake-bin: pake

      - name: Prepare artifact directory
        run: mkdir -p artifacts/macos

      - name: Build macOS app
        run: |
          # Pake generates .dmg by default on macOS
          $HOME/.pake-install/node_modules/.bin/pake "${{ inputs.url }}" \
            --name "${{ inputs.slug }}"

      - name: Collect and upload artifact
        shell: bash
        run: |
          set -euo pipefail
          SLUG="${{ inputs.slug }}"
          TARGET_DIR="artifacts/macos"
          DMG=$(find . -name "*.dmg" | head -1)
          if [ -z "$DMG" ]; then
            echo "❌ No .dmg found"
            exit 1
          fi
          cp "$DMG" "$TARGET_DIR/${SLUG}.dmg"
          echo "✅ Collected $DMG -> $TARGET_DIR/${SLUG}.dmg"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.slug }}-macos
          path: artifacts/macos/${{ inputs.slug }}.dmg
          if-no-files-found: error