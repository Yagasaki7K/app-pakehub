name: Build Application

on:
  workflow_dispatch:
    inputs:
      name:
        description: Application name
        required: true
        type: string
      url:
        description: Application URL
        required: true
        type: string
      slug:
        description: Application slug (stable identifier)
        required: true
        type: string
      pake-version:
        description: Pake CLI version
        required: false
        type: string
        default: 3.14.0
  workflow_call:
    inputs:
      name:
        description: Application name
        required: true
        type: string
      url:
        description: Application URL
        required: true
        type: string
      slug:
        description: Application slug (stable identifier)
        required: true
        type: string
      pake-version:
        description: Pake CLI version
        required: false
        type: string
        default: 3.14.0

permissions:
  contents: read

concurrency:
  group: build-${{ inputs.slug }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-windows:
    name: Build Windows MSI
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup build environment
        uses: ./.github/actions/setup-pake
        with:
          pake-version: ${{ inputs.pake-version }}

      - name: Clean workspace
        shell: bash
        run: |
          find . -name "*.msi" -type f -delete 2>/dev/null || true

      - name: Prepare artifact directory
        shell: bash
        run: mkdir -p artifacts/windows

      - name: Build Windows installer
        shell: bash
        run: |
          npx --yes pake-cli@${{ inputs.pake-version }} "${{ inputs.url }}" \
            --name "${{ inputs.slug }}"

      - name: Validate and collect artifact
        shell: bash
        run: |
          set -euo pipefail
          SLUG="${{ inputs.slug }}"
          TARGET_DIR="artifacts/windows"

          MSI_FILES=$(find . -name "*.msi" -type f)
          COUNT=$(echo "$MSI_FILES" | wc -l)

          if [ -z "$MSI_FILES" ]; then
            echo "❌ No .msi file found"
            exit 1
          fi

          if [ "$COUNT" -gt 1 ]; then
            echo "❌ Multiple .msi files found ($COUNT), expected exactly one"
            echo "$MSI_FILES"
            exit 1
          fi

          MSI_FILE=$(echo "$MSI_FILES" | head -1)
          # Validate MSI format
          if ! file "$MSI_FILE" | grep -qi "MSI\|Composite Document"; then
            echo "❌ File does not appear to be a valid MSI installer"
            file "$MSI_FILE"
            exit 1
          fi

          cp "$MSI_FILE" "$TARGET_DIR/${SLUG}.msi"
          echo "✅ Collected $MSI_FILE -> $TARGET_DIR/${SLUG}.msi"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.slug }}-windows
          path: artifacts/windows/${{ inputs.slug }}.msi
          if-no-files-found: error

  build-linux:
    name: Build Linux DEB
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup build environment
        uses: ./.github/actions/setup-pake
        with:
          pake-version: ${{ inputs.pake-version }}

      - name: Install Linux dependencies
        uses: ./.github/actions/install-linux-deps

      - name: Clean workspace
        shell: bash
        run: |
          find . -name "*.deb" -type f -delete 2>/dev/null || true

      - name: Prepare artifact directory
        run: mkdir -p artifacts/linux

      - name: Build Linux installer
        run: |
          npx --yes pake-cli@${{ inputs.pake-version }} "${{ inputs.url }}" \
            --name "${{ inputs.slug }}"

      - name: Validate and collect artifact
        shell: bash
        run: |
          set -euo pipefail
          SLUG="${{ inputs.slug }}"
          TARGET_DIR="artifacts/linux"

          DEB_FILES=$(find . -name "*.deb" -type f)
          COUNT=$(echo "$DEB_FILES" | wc -l)

          if [ -z "$DEB_FILES" ]; then
            echo "❌ No .deb file found"
            exit 1
          fi

          if [ "$COUNT" -gt 1 ]; then
            echo "❌ Multiple .deb files found ($COUNT), expected exactly one"
            echo "$DEB_FILES"
            exit 1
          fi

          DEB_FILE=$(echo "$DEB_FILES" | head -1)
          # Validate DEB format
          if ! file "$DEB_FILE" | grep -qi "Debian binary package"; then
            echo "❌ File does not appear to be a valid DEB package"
            file "$DEB_FILE"
            exit 1
          fi

          cp "$DEB_FILE" "$TARGET_DIR/${SLUG}.deb"
          echo "✅ Collected $DEB_FILE -> $TARGET_DIR/${SLUG}.deb"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.slug }}-linux
          path: artifacts/linux/${{ inputs.slug }}.deb
          if-no-files-found: error

  build-macos:
    name: Build macOS DMG
    runs-on: macos-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup build environment
        uses: ./.github/actions/setup-pake
        with:
          pake-version: ${{ inputs.pake-version }}

      - name: Clean workspace
        shell: bash
        run: |
          find . -name "*.dmg" -type f -delete 2>/dev/null || true

      - name: Prepare artifact directory
        run: mkdir -p artifacts/macos

      - name: Build macOS app
        run: |
          npx --yes pake-cli@${{ inputs.pake-version }} "${{ inputs.url }}" \
            --name "${{ inputs.slug }}"

      - name: Validate and collect artifact
        shell: bash
        run: |
          set -euo pipefail
          SLUG="${{ inputs.slug }}"
          TARGET_DIR="artifacts/macos"

          DMG_FILES=$(find . -name "*.dmg" -type f)
          COUNT=$(echo "$DMG_FILES" | wc -l)

          if [ -z "$DMG_FILES" ]; then
            echo "❌ No .dmg file found"
            exit 1
          fi

          if [ "$COUNT" -gt 1 ]; then
            echo "❌ Multiple .dmg files found ($COUNT), expected exactly one"
            echo "$DMG_FILES"
            exit 1
          fi

          DMG_FILE=$(echo "$DMG_FILES" | head -1)
          # Validate DMG format
          if ! file "$DMG_FILE" | grep -qi "Apple Disk Image\|bzip2 compressed data"; then
            echo "❌ File does not appear to be a valid DMG disk image"
            file "$DMG_FILE"
            exit 1
          fi

          cp "$DMG_FILE" "$TARGET_DIR/${SLUG}.dmg"
          echo "✅ Collected $DMG_FILE -> $TARGET_DIR/${SLUG}.dmg"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.slug }}-macos
          path: artifacts/macos/${{ inputs.slug }}.dmg
          if-no-files-found: error