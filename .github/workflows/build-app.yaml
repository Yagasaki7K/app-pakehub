name: Build Application

on:
  workflow_call:
    inputs:
      name:
        description: Application name
        required: true
        type: string
      url:
        description: Application URL
        required: true
        type: string

permissions:
  contents: read

jobs:
  build-windows:
    name: Build Windows MSI
    runs-on: windows-latest
    outputs:
      slug: ${{ steps.slug.outputs.slug }}
    steps:
      - name: Generate slug
        id: slug
        shell: bash
        run: |
          SLUG=$(printf '%s' "${{ inputs.name }}" \
            | tr '[:upper:]' '[:lower:]' \
            | sed 's/[^a-z0-9]/-/g' \
            | sed 's/-\{2,\}/-/g' \
            | sed 's/^-//' \
            | sed 's/-$//')
          echo "slug=$SLUG" >> "$GITHUB_OUTPUT"

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Prepare artifact directory
        shell: bash
        run: mkdir -p artifacts/windows

      - name: Install Pake CLI
        shell: bash
        run: npm install -g pake-cli

      - name: Verify Pake
        shell: bash
        run: pake --version

      - name: Build Windows installer
        shell: bash
        run: |
          pake "${{ inputs.url }}" \
            --name "${{ inputs.name }}"

      - name: Collect installer
        shell: bash
        run: |
          scripts/ci/collect-pake-artifacts.sh \
            --kind windows \
            --search-root . \
            --output-dir artifacts/windows

      - name: Normalize filename
        shell: bash
        run: |
          set -euo pipefail
          SLUG="${{ steps.slug.outputs.slug }}"
          find artifacts/windows -type f -iname "*.msi" | while read -r file; do
            mv "$file" "artifacts/windows/${SLUG}.msi"
          done

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.slug.outputs.slug }}-windows
          path: artifacts/windows/${{ steps.slug.outputs.slug }}.msi
          if-no-files-found: error

  build-linux:
    name: Build Linux DEB
    runs-on: ubuntu-latest
    outputs:
      slug: ${{ steps.slug.outputs.slug }}
    steps:
      - name: Generate slug
        id: slug
        shell: bash
        run: |
          SLUG=$(printf '%s' "${{ inputs.name }}" \
            | tr '[:upper:]' '[:lower:]' \
            | sed 's/[^a-z0-9]/-/g' \
            | sed 's/-\{2,\}/-/g' \
            | sed 's/^-//' \
            | sed 's/-$//')
          echo "slug=$SLUG" >> "$GITHUB_OUTPUT"

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Prepare artifact directory
        run: mkdir -p artifacts/linux

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            libssl-dev \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libpango1.0-dev \
            libcairo2-dev

      - name: Install Pake CLI
        run: npm install -g pake-cli

      - name: Verify Pake
        run: pake --version

      - name: Build Linux installer
        run: |
          pake "${{ inputs.url }}" \
            --name "${{ inputs.name }}" \
            --targets deb

      - name: Collect installer
        run: |
          scripts/ci/collect-pake-artifacts.sh \
            --kind linux \
            --search-root . \
            --output-dir artifacts/linux

      - name: Normalize filename
        shell: bash
        run: |
          set -euo pipefail
          SLUG="${{ steps.slug.outputs.slug }}"
          find artifacts/linux -type f -iname "*.deb" | while read -r file; do
            mv "$file" "artifacts/linux/${SLUG}.deb"
          done

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.slug.outputs.slug }}-linux
          path: artifacts/linux/${{ steps.slug.outputs.slug }}.deb
          if-no-files-found: error