name: Build Application

on:
  workflow_dispatch:
    inputs:
      apps:
        description: List of applications (JSON array with name, url, slug)
        required: true
        type: string
      batch_id:
        description: Batch identifier
        required: true
        type: number
      pake-version:
        description: Pake CLI version
        required: false
        type: string
        default: 3.14.0
  workflow_call:
    inputs:
      apps:
        description: List of applications (JSON array with name, url, slug)
        required: true
        type: string
      batch_id:
        description: Batch identifier
        required: true
        type: number
      pake-version:
        description: Pake CLI version
        required: false
        type: string
        default: 3.14.0

permissions:
  contents: read

concurrency:
  group: build-batch-${{ inputs.batch_id }}
  cancel-in-progress: true

jobs:
  build-platform:
    name: ${{ matrix.app.name }} (${{ matrix.platform.name }})
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      matrix:
        platform:
          - { name: windows, runner: windows-latest, ext: msi }
          - { name: linux, runner: ubuntu-latest, ext: deb }
          - { name: macos, runner: macos-latest, ext: dmg }
        app: ${{ fromJson(inputs.apps) }}
      fail-fast: false
      max-parallel: 3
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup build environment
        uses: ./.github/actions/setup-pake
        with:
          pake-version: ${{ inputs.pake-version }}

      - name: Install Linux dependencies
        if: matrix.platform.name == 'linux'
        uses: ./.github/actions/install-linux-deps

      - name: Build ${{ matrix.platform.name }} installer
        shell: bash
        run: |
          set -euo pipefail
          SLUG="${{ matrix.app.slug }}"
          URL="${{ matrix.app.url }}"
          PAKE_VERSION="${{ inputs.pake-version }}"

          BUILD_DIR=$(mktemp -d)
          cd "$BUILD_DIR"

          retry() {
            local n=0
            local max=3
            local delay=5
            until [ $n -ge $max ]; do
              if "$@"; then
                return 0
              fi
              n=$((n+1))
              echo "⚠️ Command failed (attempt $n/$max). Retrying in ${delay}s..."
              sleep $delay
              delay=$((delay * 2))
            done
            echo "❌ Failed after $max attempts."
            return 1
          }

          retry npx --yes pake-cli@$PAKE_VERSION --version >/dev/null 2>&1
          retry npx --yes pake-cli@$PAKE_VERSION "$URL" --name "$SLUG"

          ARTIFACT=$(find . -name "*.${{ matrix.platform.ext }}" | head -1)
          if [ -z "$ARTIFACT" ]; then
            echo "❌ No .${{ matrix.platform.ext }} file generated"
            exit 1
          fi

          SIZE=$(stat -c%s "$ARTIFACT" 2>/dev/null || stat -f%z "$ARTIFACT" 2>/dev/null || echo 0)
          if [ "$SIZE" -eq 0 ]; then
            echo "❌ Artifact is empty: $ARTIFACT"
            exit 1
          fi

          case "${{ matrix.platform.name }}" in
            windows)
              if ! file "$ARTIFACT" | grep -qi "MSI\|Composite Document"; then
                echo "❌ Invalid MSI format"
                exit 1
              fi
              ;;
            linux)
              if ! file "$ARTIFACT" | grep -qi "Debian binary package"; then
                echo "❌ Invalid DEB format"
                exit 1
              fi
              ;;
            macos)
              if ! hdiutil attach -readonly -nobrowse "$ARTIFACT" >/dev/null 2>&1; then
                echo "❌ Invalid DMG format"
                exit 1
              else
                hdiutil detach "$(hdiutil info | grep "$ARTIFACT" | head -1 | awk '{print $1}')" >/dev/null 2>&1 || true
              fi
              ;;
          esac

          mkdir -p "$GITHUB_WORKSPACE/artifacts/${SLUG}-${{ matrix.platform.name }}"
          cp "$ARTIFACT" "$GITHUB_WORKSPACE/artifacts/${SLUG}-${{ matrix.platform.name }}/${SLUG}.${{ matrix.platform.ext }}"
          echo "✅ Collected $SLUG for ${{ matrix.platform.name }} ($SIZE bytes)"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.app.slug }}-${{ matrix.platform.name }}
          path: artifacts/${{ matrix.app.slug }}-${{ matrix.platform.name }}/${{ matrix.app.slug }}.${{ matrix.platform.ext }}
          if-no-files-found: error