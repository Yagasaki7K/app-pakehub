name: Build Application

on:
  workflow_dispatch:
    inputs:
      name:
        description: Application name
        required: true
        type: string
      url:
        description: Application URL
        required: true
        type: string
  workflow_call:
    inputs:
      name:
        description: Application name
        required: true
        type: string
      url:
        description: Application URL
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: build-${{ inputs.name }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-windows:
    name: Build Windows MSI
    runs-on: windows-latest
    outputs:
      slug: ${{ steps.slug.outputs.slug }}
    steps:
      - name: Generate slug
        id: slug
        shell: bash
        run: |
          HASH=$(echo "${{ inputs.name }}" | sha256sum | cut -c1-4)
          SLUG=$(printf '%s' "${{ inputs.name }}" \
            | tr '[:upper:]' '[:lower:]' \
            | sed 's/[^a-z0-9]/-/g' \
            | sed 's/-\{2,\}/-/g' \
            | sed 's/^-//' \
            | sed 's/-$//')
          echo "slug=${SLUG}-${HASH}" >> "$GITHUB_OUTPUT"

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Prepare artifact directory
        shell: bash
        run: mkdir -p artifacts/windows

      - name: Install Pake CLI
        shell: bash
        run: npm install -g pake-cli@latest

      - name: Verify Pake
        shell: bash
        run: pake --version

      - name: Build Windows installer
        shell: bash
        run: |
          pake "${{ inputs.url }}" \
            --name "${{ inputs.name }}"

      - name: Collect and normalize Windows installer
        shell: bash
        run: |
          set -euo pipefail
          SLUG="${{ steps.slug.outputs.slug }}"
          TARGET_DIR="artifacts/windows"

          MSI_FILE=$(find . -name "*.msi" -type f | head -1)
          if [ -z "$MSI_FILE" ]; then
            echo "❌ No .msi file found"
            exit 1
          fi

          cp "$MSI_FILE" "$TARGET_DIR/${SLUG}.msi"
          echo "✅ Collected $MSI_FILE -> $TARGET_DIR/${SLUG}.msi"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.slug.outputs.slug }}-windows
          path: artifacts/windows/${{ steps.slug.outputs.slug }}.msi
          if-no-files-found: error

  build-linux:
    name: Build Linux DEB
    runs-on: ubuntu-latest
    outputs:
      slug: ${{ steps.slug.outputs.slug }}
    steps:
      - name: Generate slug
        id: slug
        shell: bash
        run: |
          HASH=$(echo "${{ inputs.name }}" | sha256sum | cut -c1-4)
          SLUG=$(printf '%s' "${{ inputs.name }}" \
            | tr '[:upper:]' '[:lower:]' \
            | sed 's/[^a-z0-9]/-/g' \
            | sed 's/-\{2,\}/-/g' \
            | sed 's/^-//' \
            | sed 's/-$//')
          echo "slug=${SLUG}-${HASH}" >> "$GITHUB_OUTPUT"

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Prepare artifact directory
        run: mkdir -p artifacts/linux

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            libssl-dev \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libpango1.0-dev \
            libcairo2-dev

      - name: Install Pake CLI
        run: npm install -g pake-cli@latest

      - name: Verify Pake
        run: pake --version

      - name: Build Linux installer
        run: |
          pake "${{ inputs.url }}" \
            --name "${{ inputs.name }}" \
            --targets deb

      - name: Collect and normalize Linux installer
        shell: bash
        run: |
          set -euo pipefail
          SLUG="${{ steps.slug.outputs.slug }}"
          TARGET_DIR="artifacts/linux"

          DEB_FILE=$(find . -name "*.deb" -type f | head -1)
          if [ -z "$DEB_FILE" ]; then
            echo "❌ No .deb file found"
            exit 1
          fi

          cp "$DEB_FILE" "$TARGET_DIR/${SLUG}.deb"
          echo "✅ Collected $DEB_FILE -> $TARGET_DIR/${SLUG}.deb"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.slug.outputs.slug }}-linux
          path: artifacts/linux/${{ steps.slug.outputs.slug }}.deb
          if-no-files-found: error

  build-macos:
    name: Build macOS DMG
    runs-on: macos-latest
    outputs:
      slug: ${{ steps.slug.outputs.slug }}
    steps:
      - name: Generate slug
        id: slug
        shell: bash
        run: |
          HASH=$(echo "${{ inputs.name }}" | sha256sum | cut -c1-4)
          SLUG=$(printf '%s' "${{ inputs.name }}" \
            | tr '[:upper:]' '[:lower:]' \
            | sed 's/[^a-z0-9]/-/g' \
            | sed 's/-\{2,\}/-/g' \
            | sed 's/^-//' \
            | sed 's/-$//')
          echo "slug=${SLUG}-${HASH}" >> "$GITHUB_OUTPUT"

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Prepare artifact directory
        run: mkdir -p artifacts/macos

      - name: Install Pake CLI
        run: npm install -g pake-cli@latest

      - name: Verify Pake
        run: pake --version

      - name: Build macOS app
        run: |
          pake "${{ inputs.url }}" \
            --name "${{ inputs.name }}"

      - name: Collect and normalize macOS DMG
        shell: bash
        run: |
          set -euo pipefail
          SLUG="${{ steps.slug.outputs.slug }}"
          TARGET_DIR="artifacts/macos"

          DMG_FILE=$(find . -name "*.dmg" -type f | head -1)
          if [ -z "$DMG_FILE" ]; then
            echo "❌ No .dmg file found"
            exit 1
          fi

          cp "$DMG_FILE" "$TARGET_DIR/${SLUG}.dmg"
          echo "✅ Collected $DMG_FILE -> $TARGET_DIR/${SLUG}.dmg"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.slug.outputs.slug }}-macos
          path: artifacts/macos/${{ steps.slug.outputs.slug }}.dmg
          if-no-files-found: error