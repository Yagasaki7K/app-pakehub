name: Build Application

on:
  workflow_dispatch:
    inputs:
      name:
        description: Application name
        required: true
        type: string
      url:
        description: Application URL
        required: true
        type: string
  workflow_call:
    inputs:
      name:
        description: Application name
        required: true
        type: string
      url:
        description: Application URL
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: build-${{ inputs.name }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-windows:
    name: Build Windows MSI
    runs-on: windows-latest
    outputs:
      slug: ${{ steps.slug.outputs.slug }}
    steps:
      - name: Generate slug
        id: slug
        shell: bash
        run: |
          SLUG=$(printf '%s' "${{ inputs.name }}" \
            | tr '[:upper:]' '[:lower:]' \
            | sed 's/[^a-z0-9]/-/g' \
            | sed 's/-\{2,\}/-/g' \
            | sed 's/^-//' \
            | sed 's/-$//')
          echo "slug=$SLUG" >> "$GITHUB_OUTPUT"

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Prepare artifact directory
        shell: bash
        run: mkdir -p artifacts/windows

      - name: Install Pake CLI
        shell: bash
        run: npm install -g pake-cli

      - name: Verify Pake
        shell: bash
        run: pake --version

      - name: Build Windows installer
        shell: bash
        run: |
          pake "${{ inputs.url }}" \
            --name "${{ inputs.name }}"

      - name: List generated files (debug)
        shell: bash
        run: |
          echo "Files in current directory after build:"
          find . -maxdepth 2 -type f -name "*.msi" -o -name "*.exe" | sort

      - name: Collect installer
        shell: bash
        run: |
          scripts/ci/collect-pake-artifacts.sh \
            --kind windows \
            --search-root . \
            --output-dir artifacts/windows

      - name: Normalize filename
        shell: bash
        run: |
          set -euo pipefail
          SLUG="${{ steps.slug.outputs.slug }}"
          TARGET_DIR="artifacts/windows"
          # Remove old file
          find "$TARGET_DIR" -type f -iname "${SLUG}.msi" -delete 2>/dev/null || true
          # Find first .msi and rename
          MSI_FILE=$(find "$TARGET_DIR" -type f -iname "*.msi" | head -1)
          if [ -z "$MSI_FILE" ]; then
            echo "❌ No .msi file found in $TARGET_DIR"
            exit 1
          fi
          mv "$MSI_FILE" "$TARGET_DIR/${SLUG}.msi"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.slug.outputs.slug }}-windows
          path: artifacts/windows/${{ steps.slug.outputs.slug }}.msi
          if-no-files-found: error

  build-linux:
    name: Build Linux DEB
    runs-on: ubuntu-latest
    outputs:
      slug: ${{ steps.slug.outputs.slug }}
    steps:
      - name: Generate slug
        id: slug
        shell: bash
        run: |
          SLUG=$(printf '%s' "${{ inputs.name }}" \
            | tr '[:upper:]' '[:lower:]' \
            | sed 's/[^a-z0-9]/-/g' \
            | sed 's/-\{2,\}/-/g' \
            | sed 's/^-//' \
            | sed 's/-$//')
          echo "slug=$SLUG" >> "$GITHUB_OUTPUT"

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Prepare artifact directory
        run: mkdir -p artifacts/linux

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            libssl-dev \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libpango1.0-dev \
            libcairo2-dev

      - name: Install Pake CLI
        run: npm install -g pake-cli

      - name: Verify Pake
        run: pake --version

      - name: Build Linux installer
        run: |
          pake "${{ inputs.url }}" \
            --name "${{ inputs.name }}" \
            --targets deb

      - name: List generated files (debug)
        run: |
          echo "Files in current directory after build:"
          find . -maxdepth 2 -type f -name "*.deb" | sort

      - name: Collect installer
        run: |
          scripts/ci/collect-pake-artifacts.sh \
            --kind linux \
            --search-root . \
            --output-dir artifacts/linux

      - name: Normalize filename
        shell: bash
        run: |
          set -euo pipefail
          SLUG="${{ steps.slug.outputs.slug }}"
          TARGET_DIR="artifacts/linux"
          find "$TARGET_DIR" -type f -iname "${SLUG}.deb" -delete 2>/dev/null || true
          DEB_FILE=$(find "$TARGET_DIR" -type f -iname "*.deb" | head -1)
          if [ -z "$DEB_FILE" ]; then
            echo "❌ No .deb file found in $TARGET_DIR"
            exit 1
          fi
          mv "$DEB_FILE" "$TARGET_DIR/${SLUG}.deb"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.slug.outputs.slug }}-linux
          path: artifacts/linux/${{ steps.slug.outputs.slug }}.deb
          if-no-files-found: error

  build-macos:
    name: Build macOS DMG
    runs-on: macos-latest
    outputs:
      slug: ${{ steps.slug.outputs.slug }}
    steps:
      - name: Generate slug
        id: slug
        shell: bash
        run: |
          SLUG=$(printf '%s' "${{ inputs.name }}" \
            | tr '[:upper:]' '[:lower:]' \
            | sed 's/[^a-z0-9]/-/g' \
            | sed 's/-\{2,\}/-/g' \
            | sed 's/^-//' \
            | sed 's/-$//')
          echo "slug=$SLUG" >> "$GITHUB_OUTPUT"

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Prepare artifact directory
        run: mkdir -p artifacts/macos

      - name: Install Pake CLI
        run: npm install -g pake-cli

      - name: Verify Pake
        run: pake --version

      - name: Build macOS app
        run: |
          pake "${{ inputs.url }}" \
            --name "${{ inputs.name }}"

      - name: List generated files (debug)
        run: |
          echo "Files in current directory after build:"
          find . -maxdepth 2 -type d -name "*.app" | sort
          ls -la

      - name: Find and convert .app to .dmg
        shell: bash
        run: |
          set -euo pipefail
          SLUG="${{ steps.slug.outputs.slug }}"
          TARGET_DIR="artifacts/macos"

          # Procura o .app gerado pelo Pake (até 3 níveis de profundidade)
          APP=$(find . -maxdepth 3 -type d -name "*.app" | head -1)
          if [ -z "$APP" ]; then
            echo "❌ No .app bundle found. Listing current directory for debugging:"
            ls -la
            find . -maxdepth 3 -type d | sort
            exit 1
          fi

          echo "✅ Found .app at: $APP"
          # Cria o .dmg a partir do .app
          DMG_NAME="${SLUG}.dmg"
          hdiutil create -srcfolder "$APP" -format UDZO -volname "$SLUG" "$TARGET_DIR/$DMG_NAME"
          echo "✅ DMG created: $TARGET_DIR/$DMG_NAME"

          # Remove o .app para economizar espaço
          rm -rf "$APP"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.slug.outputs.slug }}-macos
          path: artifacts/macos/${{ steps.slug.outputs.slug }}.dmg
          if-no-files-found: error