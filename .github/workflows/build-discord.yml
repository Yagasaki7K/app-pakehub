name: Build and Release Pake Installers

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:
  schedule:
    - cron: '0 0 1 * *'

permissions:
  contents: read

concurrency:
  group: pake-installers-${{ github.ref }}
  cancel-in-progress: false

env:
  NODE_VERSION: '22'
  APP_URL: https://discord.com
  APP_NAME: discord
  PROJECTS_DIR: projects
  ARTIFACTS_DIR: artifacts

jobs:
  build-windows:
    name: Build Windows MSI
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Prepare artifact directory
        shell: bash
        run: mkdir -p "$ARTIFACTS_DIR/windows"

      - name: Configure pnpm global bin directory
        shell: bash
        run: |
          echo "PNPM_HOME=$RUNNER_TEMP/pnpm" >> "$GITHUB_ENV"
          echo "$RUNNER_TEMP/pnpm" >> "$GITHUB_PATH"

      - name: Install pnpm
        shell: bash
        run: npm install -g pnpm

      - name: Install Pake CLI
        shell: bash
        run: pnpm install -g pake-cli

      - name: Build Windows installer
        shell: bash
        run: pake "$APP_URL" --name "$APP_NAME"

      - name: Discover and collect Windows installer
        shell: bash
        run: scripts/ci/collect-pake-artifacts.sh --kind windows --search-root . --output-dir "$ARTIFACTS_DIR/windows"

      - name: Upload Windows installer
        uses: actions/upload-artifact@v7
        with:
          name: windows-msi
          path: artifacts/windows/*.msi
          if-no-files-found: error

  build-linux:
    name: Build Linux DEB
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Prepare artifact directory
        run: mkdir -p "$ARTIFACTS_DIR/linux"

      - name: Install Linux dependencies
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            libssl-dev \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libpango1.0-dev \
            libcairo2-dev

      - name: Configure pnpm global bin directory
        run: |
          echo "PNPM_HOME=$RUNNER_TEMP/pnpm" >> "$GITHUB_ENV"
          echo "$RUNNER_TEMP/pnpm" >> "$GITHUB_PATH"

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install Pake CLI
        run: pnpm install -g pake-cli

      - name: Build Linux installer
        run: pake "$APP_URL" --name "$APP_NAME" --targets deb

      - name: Discover and collect Linux installer
        run: scripts/ci/collect-pake-artifacts.sh --kind linux --search-root . --output-dir "$ARTIFACTS_DIR/linux"

      - name: Upload Linux installer
        uses: actions/upload-artifact@v7
        with:
          name: linux-deb
          path: artifacts/linux/*.deb
          if-no-files-found: error

  build-macos:
    name: Build macOS APP and DMG
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Prepare artifact directory
        run: mkdir -p "$ARTIFACTS_DIR/macos"

      - name: Configure pnpm global bin directory
        run: |
          echo "PNPM_HOME=$RUNNER_TEMP/pnpm" >> "$GITHUB_ENV"
          echo "$RUNNER_TEMP/pnpm" >> "$GITHUB_PATH"

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install Pake CLI
        run: pnpm install -g pake-cli

      - name: Build macOS application bundle and disk image
        run: pake "$APP_URL" --name "$APP_NAME"

      - name: Discover and collect macOS artifacts
        run: scripts/ci/collect-pake-artifacts.sh --kind macos --search-root . --output-dir "$ARTIFACTS_DIR/macos"

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v7
        with:
          name: macos-app-dmg
          path: artifacts/macos
          if-no-files-found: error

  create-release-and-commit:
    name: Commit projects directory and publish release
    needs:
      - build-windows
      - build-linux
      - build-macos
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Prepare clean local directories
        run: |
          set -euo pipefail
          rm -rf "$ARTIFACTS_DIR"
          mkdir -p "$PROJECTS_DIR" "$ARTIFACTS_DIR/downloaded"
          find "$PROJECTS_DIR" -mindepth 1 -maxdepth 1 -exec rm -rf {} +

      - name: Download build artifacts
        uses: actions/download-artifact@v7
        with:
          path: artifacts/downloaded
          merge-multiple: false

      - name: Diagnose downloaded artifacts
        run: |
          set -euo pipefail
          echo "Downloaded artifacts directory:"
          find "$ARTIFACTS_DIR" -maxdepth 8 -print | sort

      - name: Copy verified installers into projects
        run: |
          set -euo pipefail
          msi_count=0
          deb_count=0
          dmg_count=0
          app_count=0

          while IFS= read -r -d '' file; do
            cp -f "$file" "$PROJECTS_DIR/"
            msi_count=$((msi_count + 1))
          done < <(find "$ARTIFACTS_DIR/downloaded" -type f -name '*.msi' -print0)

          while IFS= read -r -d '' file; do
            cp -f "$file" "$PROJECTS_DIR/"
            deb_count=$((deb_count + 1))
          done < <(find "$ARTIFACTS_DIR/downloaded" -type f -name '*.deb' -print0)

          while IFS= read -r -d '' file; do
            cp -f "$file" "$PROJECTS_DIR/"
            dmg_count=$((dmg_count + 1))
          done < <(find "$ARTIFACTS_DIR/downloaded" -type f -name '*.dmg' -print0)

          while IFS= read -r -d '' app; do
            destination="$PROJECTS_DIR/$(basename "$app")"
            rm -rf "$destination"
            cp -R "$app" "$destination"
            app_count=$((app_count + 1))
          done < <(find "$ARTIFACTS_DIR/downloaded" -type d -name '*.app' -print0)

          echo "Copied counts: MSI=$msi_count DEB=$deb_count DMG=$dmg_count APP=$app_count"

      - name: Validate projects directory
        run: scripts/ci/validate-projects.sh "$PROJECTS_DIR"

      - name: Commit generated installers
        run: |
          set -euo pipefail
          git config user.name "Anderson Marlon"
          git config user.email "anderson18.marlon@gmail.com"
          git add "$PROJECTS_DIR/"

          if git diff --staged --quiet; then
            echo "No generated installer changes to commit."
          else
            git commit -m "Update generated installers [skip ci]"
            git push origin "HEAD:${GITHUB_REF_NAME}"
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ github.run_number }}
          name: Release v${{ github.run_number }}
          files: |
            projects/*.msi
            projects/*.deb
            projects/*.dmg
          fail_on_unmatched_files: true
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
