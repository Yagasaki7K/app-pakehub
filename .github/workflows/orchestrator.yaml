name: Orchestrator - Build All Apps

on:
  push:
    paths:
      - apps.json
      - .github/workflows/**
      - .github/actions/**
  workflow_dispatch:
    inputs:
      prerelease:
        description: 'Mark release as prerelease?'
        type: boolean
        default: true

permissions:
  contents: read

concurrency:
  group: orchestrator-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate apps.json
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
      app_count: ${{ steps.matrix.outputs.app_count }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Validate and build matrix
        id: matrix
        shell: bash
        run: |
          if [ ! -f apps.json ]; then
            echo "❌ apps.json not found"
            exit 1
          fi

          python3 << 'EOF'
          import json, re, sys, os
          from urllib.parse import urlparse

          with open('apps.json') as f:
              data = json.load(f)
              apps = data.get('apps', [])

          if not apps:
              print("❌ apps.json must contain a non-empty .apps array")
              sys.exit(1)

          slugs = []
          for idx, app in enumerate(apps):
              if 'name' not in app or 'url' not in app:
                  print(f"❌ App at index {idx} missing 'name' or 'url'")
                  sys.exit(1)
              if not app['name'].strip():
                  print(f"❌ App at index {idx} has empty name")
                  sys.exit(1)
              parsed = urlparse(app['url'])
              if parsed.scheme not in ('http', 'https') or not parsed.netloc:
                  print(f"❌ Invalid URL: {app['url']}")
                  sys.exit(1)

              slug = app.get('slug')
              if slug:
                  if not re.match(r'^[a-z0-9][a-z0-9-]*$', slug):
                      print(f"❌ Invalid slug '{slug}' for app '{app['name']}'")
                      sys.exit(1)
              else:
                  slug = re.sub(r'-+', '-', re.sub(r'[^a-z0-9]', '-', app['name'].lower())).strip('-')
                  if not slug:
                      slug = 'app'
              if slug in slugs:
                  print(f"❌ Duplicate slug '{slug}' for app '{app['name']}'")
                  sys.exit(1)
              slugs.append(slug)

          matrix = {'include': []}
          for app, slug in zip(apps, slugs):
              matrix['include'].append({
                  'name': app['name'],
                  'url': app['url'],
                  'slug': slug
              })

          if len(apps) > 256:
              print(f"❌ Matrix limit exceeded: {len(apps)} > 256")
              sys.exit(1)

          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
              f.write(f"matrix={json.dumps(matrix)}\n")
              f.write(f"app_count={len(apps)}\n")

          print(f"✅ Matrix generated with {len(apps)} apps")
          EOF

  smoke-test:
    name: Smoke test (${{ matrix.target }})
    needs: validate
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - runner: windows-latest
            target: windows
            ext: msi
          - runner: ubuntu-latest
            target: linux
            ext: deb
          - runner: macos-latest
            target: macos
            ext: dmg
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup build environment
        uses: ./.github/actions/setup-pake

      - name: Install Linux dependencies
        if: matrix.target == 'linux'
        uses: ./.github/actions/install-linux-deps

      - name: Run smoke test
        shell: bash
        run: |
          TEST_URL="https://example.com"
          TEST_NAME="smoke-test-${{ matrix.target }}"
          SMOKE_DIR=$(mktemp -d)
          cd "$SMOKE_DIR"

          npx --yes pake-cli@3.14.0 "$TEST_URL" --name "$TEST_NAME"

          ARTIFACT=$(find . -name "*.${{ matrix.ext }}" | head -1)
          if [ -z "$ARTIFACT" ]; then
            echo "❌ No .${{ matrix.ext }} file generated"
            ls -la
            exit 1
          fi

          SIZE=$(stat -c%s "$ARTIFACT" 2>/dev/null || stat -f%z "$ARTIFACT" 2>/dev/null || echo 0)
          if [ "$SIZE" -eq 0 ]; then
            echo "❌ Generated file is empty: $ARTIFACT"
            exit 1
          fi

          # Validate file format per platform
          case "${{ matrix.target }}" in
            windows)
              if ! file "$ARTIFACT" | grep -qi "MSI\|Composite Document"; then
                echo "❌ File does not appear to be a valid MSI installer"
                exit 1
              fi
              ;;
            linux)
              if ! file "$ARTIFACT" | grep -qi "Debian binary package"; then
                echo "❌ File does not appear to be a valid DEB package"
                exit 1
              fi
              ;;
            macos)
              # Use hdiutil verify (official Apple tool) for DMG validation
              if ! hdiutil verify "$ARTIFACT" >/dev/null 2>&1; then
                echo "❌ DMG verification failed for $ARTIFACT"
                hdiutil verify "$ARTIFACT" 2>&1 || true
                exit 1
              fi
              ;;
          esac

          echo "✅ Smoke test passed on ${{ matrix.target }}: $ARTIFACT ($SIZE bytes)"
          cd -
          rm -rf "$SMOKE_DIR"

  build:
    name: Build ${{ matrix.name }}
    needs: [validate, smoke-test]
    permissions:
      contents: read
    strategy:
      matrix: ${{ fromJson(needs.validate.outputs.matrix) }}
      fail-fast: false
      max-parallel: 4
    uses: ./.github/workflows/build-app.yaml
    with:
      name: ${{ matrix.name }}
      url: ${{ matrix.url }}
      slug: ${{ matrix.slug }}

  release:
    name: Create GitHub Release
    needs: [validate, smoke-test, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: read
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Generate release tag
        id: tag
        shell: bash
        run: |
          TAG="v$(date +'%Y.%m.%d')-build.${{ github.run_id }}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: false

      - name: Validate artifacts per application
        shell: bash
        run: |
          set -euo pipefail
          echo "🔍 Validating artifacts per app..."

          MATRIX_JSON='${{ needs.validate.outputs.matrix }}'
          SLUGS=$(echo "$MATRIX_JSON" | jq -r '.include[].slug')
          echo "📋 Expected slugs: $SLUGS"

          MISSING=0
          for slug in $SLUGS; do
            for platform in windows linux macos; do
              case $platform in
                windows) ext=msi ;;
                linux) ext=deb ;;
                macos) ext=dmg ;;
              esac
              FILE="artifacts/${slug}-${platform}/${slug}.${ext}"
              if [ ! -f "$FILE" ]; then
                echo "❌ Missing artifact for $slug on $platform"
                MISSING=$((MISSING + 1))
              else
                SIZE=$(stat -c%s "$FILE" 2>/dev/null || stat -f%z "$FILE" 2>/dev/null || echo 0)
                if [ "$SIZE" -eq 0 ]; then
                  echo "❌ Artifact $slug on $platform is empty"
                  MISSING=$((MISSING + 1))
                else
                  # Validate format per platform
                  case $platform in
                    windows)
                      if ! file "$FILE" | grep -qi "MSI\|Composite Document"; then
                        echo "❌ Invalid MSI format for $slug on $platform"
                        MISSING=$((MISSING + 1))
                      else
                        echo "✅ Found $slug on $platform ($SIZE bytes)"
                      fi
                      ;;
                    linux)
                      if ! file "$FILE" | grep -qi "Debian binary package"; then
                        echo "❌ Invalid DEB format for $slug on $platform"
                        MISSING=$((MISSING + 1))
                      else
                        echo "✅ Found $slug on $platform ($SIZE bytes)"
                      fi
                      ;;
                    macos)
                      # Use hdiutil verify for DMG validation
                      if ! hdiutil verify "$FILE" >/dev/null 2>&1; then
                        echo "❌ Invalid DMG format for $slug on $platform"
                        hdiutil verify "$FILE" 2>&1 || true
                        MISSING=$((MISSING + 1))
                      else
                        echo "✅ Found $slug on $platform ($SIZE bytes)"
                      fi
                      ;;
                  esac
                fi
              fi
            done
          done

          if [ "$MISSING" -gt 0 ]; then
            echo "❌ $MISSING artifacts missing, empty, or invalid"
            exit 1
          fi
          echo "✅ All artifacts present and valid for all apps"

      - name: Prepare release assets
        shell: bash
        run: |
          mkdir -p release-assets
          find artifacts -type f \( -name "*.msi" -o -name "*.deb" -o -name "*.dmg" \) | while read -r file; do
            cp "$file" release-assets/
          done

      - name: Generate SHA256 checksums
        shell: bash
        run: |
          cd release-assets
          sha256sum * > SHA256SUMS
          cd -

      - name: Verify checksums
        shell: bash
        run: |
          cd release-assets
          sha256sum -c SHA256SUMS
          cd -

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Build ${{ steps.tag.outputs.tag }}"
          tag_name: ${{ steps.tag.outputs.tag }}
          generate_release_notes: true
          files: release-assets/*
          prerelease: ${{ github.event_name == 'workflow_dispatch' && inputs.prerelease != false || true }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  status-report:
    name: Build status report
    needs: [validate, smoke-test, build, release]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    if: always()
    steps:
      - name: Generate status summary
        shell: bash
        run: |
          echo "## 📊 Build Status" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          VALIDATE_RESULT="${{ needs.validate.result }}"
          SMOKE_RESULT="${{ needs.smoke-test.result }}"
          BUILD_RESULT="${{ needs.build.result }}"
          RELEASE_RESULT="${{ needs.release.result }}"

          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Validate | $VALIDATE_RESULT |" >> $GITHUB_STEP_SUMMARY
          echo "| Smoke Test | $SMOKE_RESULT |" >> $GITHUB_STEP_SUMMARY
          echo "| Build | $BUILD_RESULT |" >> $GITHUB_STEP_SUMMARY
          echo "| Release | $RELEASE_RESULT |" >> $GITHUB_STEP_SUMMARY

          if [ "$BUILD_RESULT" == "success" ] && [ "$RELEASE_RESULT" == "success" ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "✅ All builds completed successfully!" >> $GITHUB_STEP_SUMMARY
            exit 0
          else
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "⚠️ Some jobs failed. Check the logs." >> $GITHUB_STEP_SUMMARY
            exit 1
          fi