name: Orchestrator - Build All Apps

on:
  push:
    paths:
      - apps.json
      - .github/workflows/**
      - .github/actions/**
  workflow_dispatch:
    inputs:
      prerelease:
        description: 'Mark release as prerelease?'
        type: boolean
        default: true
      max_parallel:
        description: 'Maximum parallel builds'
        required: false
        type: number
        default: 4
  schedule:
    - cron: '0 3 * * 0'

permissions:
  contents: read

concurrency:
  group: orchestrator-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate apps.json
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      apps: ${{ steps.validate.outputs.apps }}
      app_count: ${{ steps.validate.outputs.app_count }}
      smoke: ${{ steps.validate.outputs.smoke }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 1

      - name: Validate and build app list
        id: validate
        shell: bash
        run: |
          set -euo pipefail

          if [ ! -f apps.json ]; then
            echo "❌ apps.json not found"
            exit 1
          fi

          python3 << 'EOF'
          import json, re, sys, os
          from urllib.parse import urlparse

          with open('apps.json') as f:
              data = json.load(f)
              apps = data.get('apps', [])

          if not apps:
              print("❌ apps.json must contain a non-empty .apps array")
              sys.exit(1)

          for idx, app in enumerate(apps):
              if 'name' not in app or 'url' not in app:
                  print(f"❌ App at index {idx} missing 'name' or 'url'")
                  sys.exit(1)
              if not app['name'].strip():
                  print(f"❌ App at index {idx} has empty name")
                  sys.exit(1)
              parsed = urlparse(app['url'])
              if parsed.scheme not in ('http', 'https') or not parsed.netloc:
                  print(f"❌ Invalid URL: {app['url']}")
                  sys.exit(1)

          def slugify(name):
              try:
                  import unicodedata
                  name = unicodedata.normalize('NFKD', name).encode('ascii', 'ignore').decode('ascii')
              except:
                  pass
              slug = re.sub(r'-+', '-', re.sub(r'[^a-z0-9]', '-', name.lower())).strip('-')
              return slug if slug else 'app'

          slugs = []
          app_list = []
          smoke = None
          for app in apps:
              slug = slugify(app['name'])
              if slug in slugs:
                  print(f"❌ Duplicate slug '{slug}' for app '{app['name']}'")
                  sys.exit(1)
              slugs.append(slug)
              if app['name'] == '__smoke__':
                  smoke = {'name': app['name'], 'url': app['url'], 'slug': slug}
              else:
                  app_list.append({'name': app['name'], 'url': app['url'], 'slug': slug})

          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
              f.write(f"apps={json.dumps(app_list)}\n")
              f.write(f"app_count={len(app_list)}\n")
              f.write(f"smoke={json.dumps(smoke) if smoke else 'null'}\n")

          print(f"✅ Validated {len(app_list)} apps" + (f" (smoke: {smoke['name']})" if smoke else ""))
          EOF

  smoke-test:
    name: Smoke test
    needs: validate
    if: needs.validate.outputs.smoke != 'null'
    uses: ./.github/workflows/build-app.yaml
    with:
      name: __smoke__
      url: ${{ fromJson(needs.validate.outputs.smoke).url }}
      slug: smoke
      pake-version: 3.14.0
      prerelease: true
      is_smoke: true
    secrets:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build:
    name: Build ${{ matrix.app.name }}
    needs: [validate, smoke-test]
    permissions:
      contents: read
    strategy:
      matrix:
        app: ${{ fromJson(needs.validate.outputs.apps) }}
      fail-fast: false
      max-parallel: ${{ inputs.max_parallel || vars.MAX_PARALLEL || 4 }}
    uses: ./.github/workflows/build-app.yaml
    with:
      name: ${{ matrix.app.name }}
      url: ${{ matrix.app.url }}
      slug: ${{ matrix.app.slug }}
      pake-version: 3.14.0
      prerelease: ${{ github.event_name == 'workflow_dispatch' && inputs.prerelease != false || true }}
      is_smoke: false
    secrets:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  status-report:
    name: Build status report
    needs: [validate, smoke-test, build]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    if: always()
    steps:
      - name: Generate status summary
        shell: bash
        run: |
          set -euo pipefail

          echo "## 📊 Build Status Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          VALIDATE_RESULT="${{ needs.validate.result }}"
          SMOKE_RESULT="${{ needs.smoke-test.result }}"
          BUILD_RESULT="${{ needs.build.result }}"

          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Validate | $VALIDATE_RESULT |" >> $GITHUB_STEP_SUMMARY
          echo "| Smoke Test | $SMOKE_RESULT |" >> $GITHUB_STEP_SUMMARY
          echo "| Build | $BUILD_RESULT |" >> $GITHUB_STEP_SUMMARY

          if [ "$SMOKE_RESULT" == "success" ] && [ "$BUILD_RESULT" == "success" ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "✅ All builds completed successfully!" >> $GITHUB_STEP_SUMMARY
            exit 0
          else
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "⚠️ Some jobs failed. Check the logs." >> $GITHUB_STEP_SUMMARY
            exit 1
          fi