name: Orchestrator - Build All Apps

on:
  push:
    paths:
      - apps.json
  workflow_dispatch:

permissions:
  contents: write
  actions: write

concurrency:
  group: orchestrator-${{ github.ref }}
  cancel-in-progress: true

jobs:
  orchestrate:
    name: Orchestrate builds
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate apps.json (new format with .apps)
        id: read
        shell: bash
        run: |
          if [ ! -f apps.json ]; then
            echo "❌ apps.json not found"
            exit 1
          fi
          if ! jq -e '.apps | length > 0' apps.json > /dev/null; then
            echo "❌ apps.json must contain an .apps array"
            exit 1
          fi
          if ! jq -e '.apps | all(has("name") and has("url"))' apps.json > /dev/null; then
            echo "❌ Each app must have 'name' and 'url'"
            exit 1
          fi

      - name: Trigger builds and store run IDs
        id: trigger
        shell: bash
        run: |
          RUN_IDS=""
          while IFS= read -r app; do
            name=$(echo "$app" | jq -r '.name')
            url=$(echo "$app" | jq -r '.url')
            echo "🚀 Triggering build for: $name"
            # Run and capture the run ID
            ID=$(gh workflow run build-app.yaml --ref "${{ github.ref }}" -f name="$name" -f url="$url" --json id --jq '.id')
            RUN_IDS="$RUN_IDS $ID"
          done < <(jq -c '.apps[]' apps.json)
          echo "run_ids=$RUN_IDS" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Monitor builds and cancel on failure
        shell: bash
        run: |
          set -euo pipefail
          RUN_IDS="${{ steps.trigger.outputs.run_ids }}"
          if [ -z "$RUN_IDS" ]; then
            echo "No runs triggered, exiting"
            exit 0
          fi
          echo "⏳ Monitoring runs: $RUN_IDS"
          TOTAL=$(echo "$RUN_IDS" | wc -w)
          COMPLETED=0

          for i in {1..180}; do
            FAILED=false
            for id in $RUN_IDS; do
              # Get run status and conclusion
              STATUS=$(gh run view "$id" --json status --jq '.status')
              CONCLUSION=$(gh run view "$id" --json conclusion --jq '.conclusion' 2>/dev/null || echo "")
              if [ "$STATUS" == "completed" ]; then
                ((COMPLETED++)) || true
                if [ "$CONCLUSION" != "success" ] && [ "$CONCLUSION" != "skipped" ]; then
                  echo "❌ Run $id failed with conclusion: $CONCLUSION"
                  FAILED=true
                  break
                fi
              fi
            done

            if [ "$FAILED" = true ]; then
              echo "❌ A build failed. Cancelling ALL remaining runs..."
              for id in $RUN_IDS; do
                gh run cancel "$id" 2>/dev/null || true
              done
              exit 1
            fi

            if [ "$COMPLETED" -eq "$TOTAL" ]; then
              echo "✅ All builds finished successfully."
              break
            fi

            echo "🔄 Still waiting... ($COMPLETED/$TOTAL completed)"
            sleep 10
          done

          # Timeout check
          if [ "$COMPLETED" -lt "$TOTAL" ]; then
            echo "❌ Timeout: Not all builds completed ($COMPLETED/$TOTAL)"
            for id in $RUN_IDS; do
              gh run cancel "$id" 2>/dev/null || true
            done
            exit 1
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Download artifacts from current runs only
        shell: bash
        run: |
          mkdir -p artifacts
          for id in ${{ steps.trigger.outputs.run_ids }}; do
            gh run download "$id" -D artifacts/
          done
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Normalize and copy to projects/
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p projects
          rm -rf projects/* 2>/dev/null || true
          find artifacts -type f \( -iname "*.msi" -o -iname "*.deb" -o -iname "*.dmg" \) | while read -r file; do
            filename=$(basename "$file")
            echo "📦 Copying $filename to projects/"
            cp "$file" "projects/$filename"
          done

      - name: Generate app list and update README.md / projects.md
        shell: bash
        run: |
          set -euo pipefail

          generate_app_list() {
            local ext="$1"
            local os_name="$2"
            echo "## $os_name (.$ext)"
            for file in projects/*.$ext; do
              if [ -f "$file" ]; then
                slug=$(basename "$file" .$ext)
                # Look up name from apps.json
                name=$(jq -r ".apps[] | select(.name | ascii_downcase | gsub(\"[^a-z0-9]\"; \"-\") | gsub(\"-+\"; \"-\") | gsub(\"^-|\"; \"\") == \"$slug\") | .name" apps.json 2>/dev/null || echo "")
                if [ -z "$name" ] || [ "$name" = "null" ]; then
                  name=$(echo "$slug" | sed 's/-/ /g' | sed 's/\b\(.\)/\u\1/g')
                fi
                REPO="${{ github.repository }}"
                echo "- [$name ($os_name)](https://github.com/$REPO/raw/refs/heads/main/projects/$slug.$ext)"
              fi
            done
          }

          CONTENT="# Projects to Download\n\n"
          CONTENT+="$(generate_app_list msi "Windows")\n\n"
          CONTENT+="$(generate_app_list deb "Linux")\n\n"
          CONTENT+="$(generate_app_list dmg "macOS")\n\n"

          if [ -f README.md ] && grep -q "<!-- PAKE:APPS:START -->" README.md; then
            sed -i "/<!-- PAKE:APPS:START -->/,/<!-- PAKE:APPS:END -->/c\<!-- PAKE:APPS:START -->\n$CONTENT\n<!-- PAKE:APPS:END -->" README.md
            echo "✅ README.md updated."
          else
            echo "⚠️ README.md missing markers. Skipping."
          fi

          if [ -f projects.md ] && grep -q "<!-- PAKE:APPS:START -->" projects.md; then
            sed -i "/<!-- PAKE:APPS:START -->/,/<!-- PAKE:APPS:END -->/c\<!-- PAKE:APPS:START -->\n$CONTENT\n<!-- PAKE:APPS:END -->" projects.md
            echo "✅ projects.md updated."
          else
            echo "⚠️ projects.md missing markers. Skipping."
          fi

      - name: Check for changes and commit
        id: changes
        run: |
          if git status --porcelain -- projects/ README.md projects.md 2>/dev/null | grep -q .; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit changes
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "Anderson Marlon"
          git config user.email "anderson18.marlon@gmail.com"
          git add projects/ README.md projects.md
          git commit -m "Update builds and app list via orchestrator [skip ci]"
          git push