name: Orchestrator - Build All Apps

on:
  push:
    paths:
      - apps.json
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  orchestrate:
    name: Orchestrate builds
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate and read apps.json
        id: read
        shell: bash
        run: |
          if [ ! -f apps.json ]; then
            echo "❌ apps.json not found"
            exit 1
          fi
          if ! jq -e '.[] | has("name") and has("url")' apps.json > /dev/null; then
            echo "❌ apps.json missing required fields (name, url)"
            exit 1
          fi

      - name: Get current timestamp (for filtering runs)
        id: ts
        shell: bash
        run: echo "timestamp=$(date -u +%s)" >> "$GITHUB_OUTPUT"

      - name: Trigger builds for each app
        shell: bash
        run: |
          while IFS= read -r app; do
            name=$(echo "$app" | jq -r '.name')
            url=$(echo "$app" | jq -r '.url')
            echo "🚀 Triggering build for: $name"
            gh workflow run build-app.yaml --ref "${{ github.ref }}" -f name="$name" -f url="$url"
          done < <(jq -c '.[]' apps.json)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Monitor builds – cancel all on any failure
        shell: bash
        run: |
          set -euo pipefail
          TIMESTAMP=${{ steps.ts.outputs.timestamp }}
          WORKFLOW="build-app.yaml"

          echo "⏳ Monitoring builds (started after timestamp $TIMESTAMP)..."

          for i in {1..120}; do
            # List all runs for the workflow created after the timestamp
            RUNS=$(gh run list --workflow "$WORKFLOW" --json databaseId,status,createdAt --limit 100 | jq -r ".[] | select(.createdAt | fromdateiso8601 > $TIMESTAMP)")

            if [ -z "$RUNS" ]; then
              echo "⏳ No runs found yet (waiting for triggers)..."
              sleep 10
              continue
            fi

            # Check if any run has failed or been cancelled
            FAILED=$(echo "$RUNS" | jq -r 'select(.status == "failure" or .status == "cancelled")')
            if [ -n "$FAILED" ]; then
              echo "❌ A build failed or was cancelled. Cancelling all remaining builds..."
              # Get IDs of runs that are still in_progress or queued
              TO_CANCEL=$(echo "$RUNS" | jq -r 'select(.status == "in_progress" or .status == "queued") | .databaseId')
              for id in $TO_CANCEL; do
                echo "🛑 Cancelling run $id"
                gh run cancel "$id" || true
              done
              exit 1
            fi

            # Check if all runs are completed (success or skipped)
            PENDING=$(echo "$RUNS" | jq -r 'select(.status == "in_progress" or .status == "queued")')
            if [ -z "$PENDING" ]; then
              echo "✅ All builds finished successfully."
              break
            fi

            echo "🔄 Still waiting for builds to finish..."
            sleep 10
          done
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Download all artifacts
        shell: bash
        run: |
          mkdir -p artifacts
          for run in $(gh run list --workflow build-app.yaml --status completed --json databaseId --jq '.[].databaseId'); do
            gh run download "$run" -D artifacts/
          done
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Normalize and copy to projects/
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p projects
          find artifacts -type f \( -iname "*.msi" -o -iname "*.deb" \) | while read -r file; do
            filename=$(basename "$file")
            echo "📦 Copying $filename to projects/"
            cp "$file" "projects/$filename"
          done

      - name: Check for changes in projects/
        id: changes
        run: |
          if git diff --quiet -- projects/; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit changes
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "Anderson Marlon"
          git config user.email "anderson18.marlon@gmail.com"
          git add projects/
          git commit -m "Update builds via orchestrator [skip ci]"
          git push