name: Orchestrator - Build All Apps

on:
  push:
    paths:
      - apps.json
      - .github/workflows/**
      - .github/actions/**
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: orchestrator-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate apps.json
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
      app_count: ${{ steps.matrix.outputs.app_count }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate matrix with slugs from names
        id: matrix
        shell: bash
        run: |
          if [ ! -f apps.json ]; then
            echo "❌ apps.json not found"
            exit 1
          fi

          python3 << 'EOF'
          import json, re, sys, os
          from pathlib import Path

          with open('apps.json') as f:
              data = json.load(f)
              apps = data.get('apps', [])

          if not apps:
              print("❌ apps.json must contain a non-empty .apps array")
              sys.exit(1)

          # Validate each app
          for app in apps:
              if 'name' not in app or 'url' not in app:
                  print(f"❌ Each app must have 'name' and 'url'")
                  sys.exit(1)
              if not app['url'].startswith(('http://', 'https://')):
                  print(f"❌ Invalid URL: {app['url']}")
                  sys.exit(1)

          # Generate slug from name
          def slugify(name):
              return re.sub(r'-+', '-', re.sub(r'[^a-z0-9]', '-', name.lower())).strip('-')

          # Build matrix with slugs
          matrix = {'include': []}
          slugs = []
          for app in apps:
              slug = slugify(app['name'])
              # Check for duplicate slugs BEFORE adding
              if slug in slugs:
                  print(f"❌ Duplicate slug '{slug}' generated from names: check for similar names like 'My App' and 'My-App'")
                  sys.exit(1)
              slugs.append(slug)
              matrix['include'].append({
                  'name': app['name'],
                  'url': app['url'],
                  'slug': slug
              })

          if len(apps) > 256:
              print(f"❌ Matrix limit exceeded: {len(apps)} > 256")
              sys.exit(1)

          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
              f.write(f"matrix={json.dumps(matrix)}\n")
              f.write(f"app_count={len(apps)}\n")

          print(f"✅ Matrix generated with {len(apps)} apps")
          EOF

  build:
    name: Build ${{ matrix.name }}
    needs: validate
    permissions:
      contents: read
    strategy:
      matrix: ${{ fromJson(needs.validate.outputs.matrix) }}
      fail-fast: false
      max-parallel: 6
    uses: ./.github/workflows/build-app.yaml
    with:
      name: ${{ matrix.name }}
      url: ${{ matrix.url }}
      slug: ${{ matrix.slug }}

  smoke-test:
    name: Smoke test (${{ matrix.target }})
    needs: validate
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - runner: windows-latest
            target: windows
            ext: msi
          - runner: ubuntu-latest
            target: linux
            ext: deb
          - runner: macos-latest
            target: macos
            ext: dmg
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup build environment
        uses: ./.github/actions/setup-pake
        with:
          pake-ref: 078fab3fc7b206bf8128dd9eb73ca88e76d34db4
          pake-repo: tw93/Pake
          pake-package: pake-cli
          pake-bin: pake

      - name: Smoke test
        shell: bash
        run: |
          PAKE_BIN="$HOME/.pake-install/node_modules/.bin/pake"
          TEST_URL="https://example.com"
          TEST_NAME="smoke-test-${{ matrix.target }}"
          SMOKE_DIR=$(mktemp -d)
          cd "$SMOKE_DIR"

          if [ "${{ matrix.target }}" == "linux" ]; then
            $PAKE_BIN "$TEST_URL" --name "$TEST_NAME"
            ARTIFACT=$(find . -name "*.deb" | head -1)
          else
            $PAKE_BIN "$TEST_URL" --name "$TEST_NAME"
            ARTIFACT=$(find . -name "*.${{ matrix.ext }}" | head -1)
          fi

          if [ -z "$ARTIFACT" ]; then
            echo "❌ Smoke test failed for ${{ matrix.target }}"
            ls -la
            exit 1
          fi
          echo "✅ Smoke test passed for ${{ matrix.target }}: $ARTIFACT"
          cd -
          rm -rf "$SMOKE_DIR"

  release:
    name: Create GitHub Release
    needs: [validate, build, smoke-test]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: read
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate release tag
        id: tag
        shell: bash
        run: |
          TAG="v$(date +'%Y.%m.%d')-build.${{ github.run_id }}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: false

      - name: Validate artifacts per application
        shell: bash
        run: |
          set -euo pipefail
          echo "🔍 Validating artifacts per app..."

          MATRIX_JSON='${{ needs.validate.outputs.matrix }}'
          SLUGS=$(echo "$MATRIX_JSON" | jq -r '.include[].slug')
          echo "📋 Expected slugs: $SLUGS"

          MISSING=0
          for slug in $SLUGS; do
            for ext in msi deb dmg; do
              if [ ! -f "artifacts/${slug}-${ext}/${slug}.${ext}" ]; then
                echo "❌ Missing artifact for $slug.$ext"
                MISSING=$((MISSING + 1))
              else
                echo "✅ Found $slug.$ext"
              fi
            done
          done

          if [ "$MISSING" -gt 0 ]; then
            echo "❌ $MISSING artifacts missing"
            exit 1
          fi
          echo "✅ All artifacts present for all apps"

      - name: Prepare release assets
        shell: bash
        run: |
          mkdir -p release-assets
          find artifacts -type f \( -name "*.msi" -o -name "*.deb" -o -name "*.dmg" \) | while read -r file; do
            cp "$file" release-assets/
          done

      - name: Generate SHA256 checksums
        shell: bash
        run: |
          cd release-assets
          sha256sum * > SHA256SUMS
          cd -

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Build ${{ steps.tag.outputs.tag }}"
          tag_name: ${{ steps.tag.outputs.tag }}
          generate_release_notes: true
          files: release-assets/*
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  status-report:
    name: Build status report
    needs: [build, release]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    if: always()
    steps:
      - name: Generate status summary
        shell: bash
        run: |
          echo "## 📊 Build Status" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          APPS=$(jq -r '.apps[].name' apps.json 2>/dev/null || echo "0")
          TOTAL=$(echo "$APPS" | wc -l)
          echo "**Total applications:** $TOTAL" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ needs.build.result }}" == "success" ]; then
            echo "✅ All builds completed successfully!" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ Some builds failed. Check the logs." >> $GITHUB_STEP_SUMMARY
            exit 1
          fi