name: Orchestrator - Build All Apps

on:
  push:
    paths:
      - apps.json
  workflow_dispatch:

permissions:
  contents: write
  actions: write

concurrency:
  group: orchestrator-${{ github.ref }}
  cancel-in-progress: true

jobs:
  orchestrate:
    name: Orchestrate builds
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate and read apps.json
        id: read
        shell: bash
        run: |
          if [ ! -f apps.json ]; then
            echo "❌ apps.json not found"
            exit 1
          fi
          if ! jq -e '.[] | has("name") and has("url")' apps.json > /dev/null; then
            echo "❌ apps.json missing required fields (name, url)"
            exit 1
          fi

      - name: Get current timestamp (for filtering runs)
        id: ts
        shell: bash
        run: echo "timestamp=$(date -u +%s)" >> "$GITHUB_OUTPUT"

      - name: Trigger builds for each app
        shell: bash
        run: |
          while IFS= read -r app; do
            name=$(echo "$app" | jq -r '.name')
            url=$(echo "$app" | jq -r '.url')
            echo "🚀 Triggering build for: $name"
            gh workflow run build-app.yaml --ref "${{ github.ref }}" -f name="$name" -f url="$url"
          done < <(jq -c '.[]' apps.json)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Monitor builds – cancel ALL on ANY failure
        shell: bash
        run: |
          set -euo pipefail
          TIMESTAMP=${{ steps.ts.outputs.timestamp }}
          WORKFLOW="build-app.yaml"
          BRANCH="${{ github.ref_name }}"
          TOTAL_APPS=$(jq '. | length' apps.json)
          COMPLETED=0

          echo "⏳ Monitoring builds (started after timestamp $TIMESTAMP) – Total apps: $TOTAL_APPS"

          for i in {1..180}; do
            # List runs for the current branch
            RUNS_JSON=$(gh run list --workflow "$WORKFLOW" --branch "$BRANCH" --json databaseId,status,createdAt --limit 200)
            RUNS=$(echo "$RUNS_JSON" | jq -r ".[] | select(.createdAt | fromdateiso8601 > $TIMESTAMP)")

            if [ -z "$RUNS" ]; then
              echo "⏳ No runs found yet (waiting for triggers)..."
              sleep 10
              continue
            fi

            # Check if ANY run has a failed or cancelled job
            FAILED=false
            while IFS= read -r run_id; do
              if [ -z "$run_id" ]; then continue; fi
              JOBS_JSON=$(gh run view "$run_id" --json jobs --jq '.jobs')
              JOB_FAILED=$(echo "$JOBS_JSON" | jq -r '.[] | select(.status == "failure" or .status == "cancelled") | .name' | head -1)
              if [ -n "$JOB_FAILED" ]; then
                echo "❌ Run $run_id has a failed/cancelled job: $JOB_FAILED"
                FAILED=true
                break
              fi
            done < <(echo "$RUNS" | jq -r '.databaseId')

            if [ "$FAILED" = true ]; then
              echo "❌ A build job failed. Cancelling ALL builds in progress/queued for this branch..."
              # Cancel ALL runs that are still in progress or queued (any workflow run on this branch)
              TO_CANCEL=$(gh run list --workflow "$WORKFLOW" --branch "$BRANCH" --status in_progress,queued --json databaseId --jq '.[].databaseId')
              if [ -n "$TO_CANCEL" ]; then
                for id in $TO_CANCEL; do
                  echo "🛑 Cancelling run $id"
                  gh run cancel "$id" || true
                done
              else
                echo "No pending runs to cancel."
              fi
              exit 1
            fi

            # Count completed runs (success or skipped)
            COMPLETED=$(echo "$RUNS" | jq -r 'select(.status == "completed" or .status == "skipped") | length')
            PENDING=$(echo "$RUNS" | jq -r 'select(.status == "in_progress" or .status == "queued")')

            echo "🔄 Still waiting for builds to finish... ($COMPLETED/$TOTAL_APPS completed)"

            if [ -z "$PENDING" ]; then
              # All runs completed – check if any run has conclusion != success
              FAILED_RUN=$(echo "$RUNS" | jq -r 'select(.status == "completed" and .conclusion != "success") | .databaseId' | head -1)
              if [ -n "$FAILED_RUN" ]; then
                echo "❌ Run $FAILED_RUN finished with non-success conclusion. Failing."
                exit 1
              fi
              echo "✅ All builds finished successfully. ($COMPLETED/$TOTAL_APPS completed)"
              break
            fi

            sleep 10
          done

          # After loop, check if all builds finished
          if [ "$COMPLETED" -lt "$TOTAL_APPS" ]; then
            echo "❌ Timeout: Not all builds completed within the allowed time ($COMPLETED/$TOTAL_APPS)."
            # Cancel any remaining runs
            TO_CANCEL=$(gh run list --workflow "$WORKFLOW" --branch "$BRANCH" --status in_progress,queued --json databaseId --jq '.[].databaseId')
            for id in $TO_CANCEL; do
              gh run cancel "$id" || true
            done
            exit 1
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Download all artifacts
        shell: bash
        run: |
          mkdir -p artifacts
          BRANCH="${{ github.ref_name }}"
          for run in $(gh run list --workflow build-app.yaml --branch "$BRANCH" --status completed --json databaseId --jq '.[].databaseId'); do
            gh run download "$run" -D artifacts/
          done
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Normalize and copy to projects/
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p projects
          rm -rf projects/* 2>/dev/null || true
          find artifacts -type f \( -iname "*.msi" -o -iname "*.deb" -o -iname "*.dmg" \) | while read -r file; do
            filename=$(basename "$file")
            echo "📦 Copying $filename to projects/"
            cp "$file" "projects/$filename"
          done

      - name: Generate app list and update README.md / projects.md
        shell: bash
        run: |
          set -euo pipefail

          generate_app_list() {
            local ext="$1"
            local os_name="$2"
            echo "## $os_name (.$ext)"
            for file in projects/*.$ext; do
              if [ -f "$file" ]; then
                slug=$(basename "$file" .$ext)
                name=$(jq -r ".[] | select(.name | ascii_downcase | gsub(\"[^a-z0-9]\"; \"-\") | gsub(\"-+\"; \"-\") | gsub(\"^-|\"; \"\") == \"$slug\") | .name" apps.json 2>/dev/null || echo "$slug")
                if [ -z "$name" ] || [ "$name" = "null" ]; then
                  name=$(echo "$slug" | sed 's/-/ /g' | sed 's/\b\(.\)/\u\1/g')
                fi
                echo "- [$name ($os_name)](https://github.com/Yagasaki7K/app-pakebuilder/raw/refs/heads/main/projects/$slug.$ext)"
              fi
            done
          }

          CONTENT="# Projects to Download\n\n"
          CONTENT+="$(generate_app_list msi "Windows")\n\n"
          CONTENT+="$(generate_app_list deb "Linux")\n\n"
          CONTENT+="$(generate_app_list dmg "macOS")\n\n"

          if [ -f README.md ] && grep -q "<!-- PAKE:APPS:START -->" README.md; then
            sed -i "/<!-- PAKE:APPS:START -->/,/<!-- PAKE:APPS:END -->/c\<!-- PAKE:APPS:START -->\n$CONTENT\n<!-- PAKE:APPS:END -->" README.md
            echo "✅ README.md updated."
          else
            echo "⚠️ README.md missing markers. Skipping."
          fi

          if [ -f projects.md ] && grep -q "<!-- PAKE:APPS:START -->" projects.md; then
            sed -i "/<!-- PAKE:APPS:START -->/,/<!-- PAKE:APPS:END -->/c\<!-- PAKE:APPS:START -->\n$CONTENT\n<!-- PAKE:APPS:END -->" projects.md
            echo "✅ projects.md updated."
          else
            echo "⚠️ projects.md missing markers. Skipping."
          fi

      - name: Check for changes
        id: changes
        run: |
          if git status --porcelain -- projects/ README.md projects.md 2>/dev/null | grep -q .; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit changes
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "Anderson Marlon"
          git config user.email "anderson18.marlon@gmail.com"
          git add projects/ README.md projects.md
          git commit -m "Update builds and app list via orchestrator [skip ci]"
          git push