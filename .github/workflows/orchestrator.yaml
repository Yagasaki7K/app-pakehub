name: Orchestrator - Build All Apps

on:
  push:
    paths:
      - apps.json
      - .github/workflows/**
      - .github/actions/**
  workflow_dispatch:
    inputs:
      prerelease:
        description: 'Mark release as prerelease?'
        type: boolean
        default: true

permissions:
  contents: read

concurrency:
  group: orchestrator-${{ github.ref }}
  cancel-in-progress: true

env:
  PAKE_VERSION: 3.14.0
  APPS_PER_BATCH: 20

jobs:
  validate:
    name: Validate apps.json
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      batches: ${{ steps.matrix.outputs.batches }}
      app_count: ${{ steps.matrix.outputs.app_count }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Validate and build batches
        id: matrix
        shell: bash
        run: |
          if [ ! -f apps.json ]; then
            echo "❌ apps.json not found"
            exit 1
          fi

          python3 << 'EOF'
          import json, re, sys, os, math
          from urllib.parse import urlparse

          with open('apps.json') as f:
              data = json.load(f)
              apps = data.get('apps', [])

          if not apps:
              print("❌ apps.json must contain a non-empty .apps array")
              sys.exit(1)

          # Validate each app
          for idx, app in enumerate(apps):
              if 'name' not in app or 'url' not in app:
                  print(f"❌ App at index {idx} missing 'name' or 'url'")
                  sys.exit(1)
              if not app['name'].strip():
                  print(f"❌ App at index {idx} has empty name")
                  sys.exit(1)
              parsed = urlparse(app['url'])
              if parsed.scheme not in ('http', 'https') or not parsed.netloc:
                  print(f"❌ Invalid URL: {app['url']}")
                  sys.exit(1)

          # Generate slugs internally (not stored in apps.json)
          def slugify(name):
              # Normalize Unicode, then slugify
              name = unicodedata.normalize('NFKD', name).encode('ascii', 'ignore').decode('ascii')
              return re.sub(r'-+', '-', re.sub(r'[^a-z0-9]', '-', name.lower())).strip('-') or 'app'

          slugs = []
          for app in apps:
              slug = slugify(app['name'])
              if slug in slugs:
                  print(f"❌ Duplicate slug '{slug}' for app '{app['name']}'")
                  sys.exit(1)
              slugs.append(slug)

          apps_per_batch = int(os.environ.get('APPS_PER_BATCH', 20))
          total_apps = len(apps)
          num_batches = math.ceil(total_apps / apps_per_batch)

          batches = []
          for i in range(num_batches):
              start = i * apps_per_batch
              end = min((i + 1) * apps_per_batch, total_apps)
              batch_apps = apps[start:end]
              batch_slugs = slugs[start:end]
              batch = []
              for app, slug in zip(batch_apps, batch_slugs):
                  batch.append({
                      'name': app['name'],
                      'url': app['url'],
                      'slug': slug
                  })
              batches.append({'batch_id': i + 1, 'apps': batch})

          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
              f.write(f"batches={json.dumps(batches)}\n")
              f.write(f"app_count={total_apps}\n")

          print(f"✅ Generated {len(batches)} batches for {total_apps} apps")
          EOF

  build:
    name: Batch ${{ matrix.batch_id }}
    needs: validate
    permissions:
      contents: read
    strategy:
      matrix:
        batch: ${{ fromJson(needs.validate.outputs.batches) }}
      fail-fast: false
      max-parallel: 6
    uses: ./.github/workflows/build-app.yaml
    with:
      apps: ${{ toJson(matrix.batch.apps) }}
      batch_id: ${{ matrix.batch.batch_id }}
      pake-version: ${{ env.PAKE_VERSION }}

  collect:
    name: Collect artifacts
    needs: [validate, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    if: always()
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: false

      - name: Validate artifacts per application
        shell: bash
        run: |
          set -euo pipefail
          echo "🔍 Validating artifacts per app..."

          BATCHES_JSON='${{ needs.validate.outputs.batches }}'
          ALL_SLUGS=$(echo "$BATCHES_JSON" | jq -r '.[].apps[].slug')
          echo "📋 Expected slugs: $ALL_SLUGS"

          MISSING=0
          for slug in $ALL_SLUGS; do
            for platform in windows linux macos; do
              case $platform in
                windows) ext=msi ;;
                linux) ext=deb ;;
                macos) ext=dmg ;;
              esac
              FILE="artifacts/${slug}-${platform}/${slug}.${ext}"
              if [ ! -f "$FILE" ]; then
                echo "❌ Missing artifact for $slug on $platform"
                MISSING=$((MISSING + 1))
              else
                SIZE=$(stat -c%s "$FILE" 2>/dev/null || stat -f%z "$FILE" 2>/dev/null || echo 0)
                if [ "$SIZE" -eq 0 ]; then
                  echo "❌ Artifact $slug on $platform is empty"
                  MISSING=$((MISSING + 1))
                else
                  case $platform in
                    windows)
                      if ! file "$FILE" | grep -qi "MSI\|Composite Document"; then
                        echo "❌ Invalid MSI format for $slug on $platform"
                        MISSING=$((MISSING + 1))
                      else
                        echo "✅ Found $slug on $platform ($SIZE bytes)"
                      fi
                      ;;
                    linux)
                      if ! file "$FILE" | grep -qi "Debian binary package"; then
                        echo "❌ Invalid DEB format for $slug on $platform"
                        MISSING=$((MISSING + 1))
                      else
                        echo "✅ Found $slug on $platform ($SIZE bytes)"
                      fi
                      ;;
                    macos)
                      # Robust DMG validation: attach + detach
                      if ! hdiutil attach -readonly -nobrowse "$FILE" 2>/dev/null; then
                        echo "❌ Invalid DMG format for $slug on $platform"
                        MISSING=$((MISSING + 1))
                      else
                        # Detach the mounted volume
                        hdiutil detach "$(hdiutil info | grep "$FILE" | head -1 | awk '{print $1}')" >/dev/null 2>&1 || true
                        echo "✅ Found $slug on $platform ($SIZE bytes)"
                      fi
                      ;;
                  esac
                fi
              fi
            done
          done

          if [ "$MISSING" -gt 0 ]; then
            echo "❌ $MISSING artifacts missing, empty, or invalid"
            exit 1
          fi
          echo "✅ All artifacts present and valid for all apps"

      - name: Prepare release assets
        shell: bash
        run: |
          mkdir -p release-assets
          find artifacts -type f \( -name "*.msi" -o -name "*.deb" -o -name "*.dmg" \) | while read -r file; do
            cp "$file" release-assets/
          done

      - name: Generate SHA256 checksums
        shell: bash
        run: |
          cd release-assets
          sha256sum * > SHA256SUMS
          cd -

      - name: Verify checksums
        shell: bash
        run: |
          cd release-assets
          sha256sum -c SHA256SUMS
          cd -

      - name: Create GitHub Release
        id: release
        uses: softprops/action-gh-release@v2
        with:
          name: "Build ${{ github.run_id }}"
          tag_name: "build-${{ github.run_id }}"
          generate_release_notes: true
          files: release-assets/*
          prerelease: ${{ github.event_name == 'workflow_dispatch' && inputs.prerelease != false || true }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  status-report:
    name: Build status report
    needs: [validate, build, collect, release]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    if: always()
    steps:
      - name: Generate status summary
        shell: bash
        run: |
          echo "## 📊 Build Status" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          VALIDATE_RESULT="${{ needs.validate.result }}"
          BUILD_RESULT="${{ needs.build.result }}"
          COLLECT_RESULT="${{ needs.collect.result }}"
          RELEASE_RESULT="${{ needs.release.result }}"

          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Validate | $VALIDATE_RESULT |" >> $GITHUB_STEP_SUMMARY
          echo "| Build | $BUILD_RESULT |" >> $GITHUB_STEP_SUMMARY
          echo "| Collect | $COLLECT_RESULT |" >> $GITHUB_STEP_SUMMARY
          echo "| Release | $RELEASE_RESULT |" >> $GITHUB_STEP_SUMMARY

          if [ "$BUILD_RESULT" == "success" ] && [ "$RELEASE_RESULT" == "success" ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "✅ All builds completed successfully!" >> $GITHUB_STEP_SUMMARY
            exit 0
          else
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "⚠️ Some jobs failed. Check the logs." >> $GITHUB_STEP_SUMMARY
            exit 1
          fi