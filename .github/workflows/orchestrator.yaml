name: Orchestrator - Build All Apps

on:
  push:
    paths:
      - apps.json
  workflow_dispatch:

permissions:
  contents: write
  actions: read

concurrency:
  group: orchestrator-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate apps.json
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate and build matrix
        id: matrix
        shell: bash
        run: |
          if [ ! -f apps.json ]; then
            echo "❌ apps.json not found"
            exit 1
          fi
          if ! jq -e '.apps | length > 0' apps.json > /dev/null; then
            echo "❌ apps.json must contain an .apps array"
            exit 1
          fi
          if ! jq -e '.apps | all(has("name") and has("url"))' apps.json > /dev/null; then
            echo "❌ Each app must have 'name' and 'url'"
            exit 1
          fi

          # Build matrix JSON
          MATRIX=$(jq -c '{ include: .apps }' apps.json)
          echo "matrix=$MATRIX" >> "$GITHUB_OUTPUT"
          echo "✅ Matrix generated successfully"

  build:
    name: Build ${{ matrix.name }}
    needs: validate
    runs-on: ubuntu-latest
    strategy:
      matrix: ${{ fromJson(needs.validate.outputs.matrix) }}
      fail-fast: true  # Cancela todos os jobs se um falhar
    steps:
      - name: Call reusable build workflow
        uses: ./.github/workflows/build-app.yaml
        with:
          name: ${{ matrix.name }}
          url: ${{ matrix.url }}

  collect:
    name: Collect artifacts
    needs: build
    runs-on: ubuntu-latest
    if: always() && !cancelled()
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Normalize and copy to projects/
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p projects
          rm -rf projects/* 2>/dev/null || true

          # Process .msi, .deb, .dmg files
          find artifacts -type f \( -iname "*.msi" -o -iname "*.deb" -o -iname "*.dmg" \) | while read -r file; do
            filename=$(basename "$file")
            echo "📦 Copying $filename to projects/"
            cp "$file" "projects/$filename"
          done

      - name: Generate app list and update README.md / projects.md
        shell: bash
        run: |
          set -euo pipefail

          generate_app_list() {
            local ext="$1"
            local os_name="$2"
            echo "## $os_name (.$ext)"
            for file in projects/*.$ext; do
              if [ -f "$file" ]; then
                slug=$(basename "$file" .$ext)
                # Extract the base slug without hash suffix
                base_slug=$(echo "$slug" | sed 's/-[a-f0-9]\{4\}$//')
                name=$(jq -r ".apps[] | select(.name | ascii_downcase | gsub(\"[^a-z0-9]\"; \"-\") | gsub(\"-+\"; \"-\") | gsub(\"^-|\"; \"\") == \"$base_slug\") | .name" apps.json 2>/dev/null || echo "")
                if [ -z "$name" ] || [ "$name" = "null" ]; then
                  name=$(echo "$base_slug" | sed 's/-/ /g' | sed 's/\b\(.\)/\u\1/g')
                fi
                REPO="${{ github.repository }}"
                echo "- [$name ($os_name)](https://github.com/$REPO/raw/refs/heads/main/projects/$slug.$ext)"
              fi
            done
          }

          CONTENT="# Projects to Download\n\n"
          CONTENT+="$(generate_app_list msi "Windows")\n\n"
          CONTENT+="$(generate_app_list deb "Linux")\n\n"
          CONTENT+="$(generate_app_list dmg "macOS")\n\n"

          if [ -f README.md ] && grep -q "<!-- PAKE:APPS:START -->" README.md; then
            sed -i "/<!-- PAKE:APPS:START -->/,/<!-- PAKE:APPS:END -->/c\<!-- PAKE:APPS:START -->\n$CONTENT\n<!-- PAKE:APPS:END -->" README.md
            echo "✅ README.md updated."
          else
            echo "⚠️ README.md missing markers. Skipping."
          fi

          if [ -f projects.md ] && grep -q "<!-- PAKE:APPS:START -->" projects.md; then
            sed -i "/<!-- PAKE:APPS:START -->/,/<!-- PAKE:APPS:END -->/c\<!-- PAKE:APPS:START -->\n$CONTENT\n<!-- PAKE:APPS:END -->" projects.md
            echo "✅ projects.md updated."
          else
            echo "⚠️ projects.md missing markers. Skipping."
          fi

      - name: Check for changes and commit
        id: changes
        run: |
          if git status --porcelain -- projects/ README.md projects.md 2>/dev/null | grep -q .; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit changes
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "Anderson Marlon"
          git config user.email "anderson18.marlon@gmail.com"
          git add projects/ README.md projects.md
          git commit -m "Update builds and app list via orchestrator [skip ci]"
          git push