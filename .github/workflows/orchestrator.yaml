name: Orchestrator - Build All Apps

on:
  push:
    paths:
      - apps.json
  workflow_dispatch:

permissions:
  contents: write
  actions: write  # necessário para disparar workflows via API

jobs:
  orchestrate:
    name: Orchestrate builds
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate and read apps.json
        id: read
        shell: bash
        run: |
          if [ ! -f apps.json ]; then
            echo "❌ apps.json not found"
            exit 1
          fi

          if ! jq -e '.[] | has("name") and has("url")' apps.json > /dev/null; then
            echo "❌ apps.json missing required fields (name, url)"
            exit 1
          fi

          # Gera uma lista de apps em formato JSON para processar
          jq -c '.[]' apps.json > apps_list.json
          echo "apps_list=apps_list.json" >> "$GITHUB_OUTPUT"

      - name: Trigger builds for each app
        shell: bash
        run: |
          while IFS= read -r app; do
            name=$(echo "$app" | jq -r '.name')
            url=$(echo "$app" | jq -r '.url')
            echo "🚀 Triggering build for: $name"
            gh workflow run build-app.yaml --ref "${{ github.ref }}" -f name="$name" -f url="$url"
          done < <(jq -c '.[]' apps.json)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Wait for builds to finish
        shell: bash
        run: |
          echo "⏳ Waiting for all triggered workflows to complete..."
          # Aguarda até 10 minutos (600 segundos)
          for i in {1..60}; do
            pending=$(gh run list --workflow build-app.yaml --status in_progress --json status | jq 'length')
            if [ "$pending" -eq 0 ]; then
              echo "✅ All builds finished."
              break
            fi
            echo "🔄 $pending builds still running... ($i/60)"
            sleep 10
          done
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Download all artifacts
        shell: bash
        run: |
          mkdir -p artifacts
          # Baixa artefatos de todos os runs bem-sucedidos do workflow build-app.yaml
          for run in $(gh run list --workflow build-app.yaml --status completed --json databaseId --jq '.[].databaseId'); do
            gh run download "$run" -D artifacts/
          done
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Normalize and copy to projects/
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p projects

          # Procura por arquivos .msi e .deb nos artefatos baixados
          find artifacts -type f \( -iname "*.msi" -o -iname "*.deb" \) | while read -r file; do
            filename=$(basename "$file")
            echo "📦 Copying $filename to projects/"
            cp "$file" "projects/$filename"
          done

      - name: Check for changes in projects/
        id: changes
        run: |
          if git diff --quiet -- projects/; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit changes
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "Anderson Marlon"
          git config user.email "anderson18.marlon@gmail.com"
          git add projects/
          git commit -m "Update builds via orchestrator [skip ci]"
          git push