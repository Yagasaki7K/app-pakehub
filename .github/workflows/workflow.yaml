name: Orchestrator - Trigger all workflows

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 1 * *'

concurrency:
  group: orchestrator-${{ github.ref }}
  cancel-in-progress: false

jobs:
  generate:
    name: Generate workflows and docs from apps.json
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Run generator
        run: go run ./scripts/generate/main.go

      - name: Commit generated files
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/workflows PROJECTS.md
          [ -f README.md ] && git add README.md || true
          if git diff --cached --quiet; then
            echo "✅ Nothing to update"
          else
            git commit -m "chore: regenerate workflows and docs from apps.json [skip ci]"
            git push
          fi

  trigger-all:
    needs: generate
    runs-on: ubuntu-latest

    permissions:
      contents: write
      actions: write

    steps:
      - uses: actions/checkout@v4

      - name: Trigger all workflows and collect run IDs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          BRANCH="${{ github.ref_name }}"
          TS=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          : > run_ids.txt

          gh workflow list --limit 100 --json id,name,path | \
            jq -r '.[] | select(.path != ".github/workflows/workflow.yaml") | "\(.id)\t\(.name)"' > workflows.txt

          echo "📋 Workflows to trigger:"
          cat workflows.txt

          while IFS=$'\t' read -r WF_ID WF_NAME; do
            echo "▶️ Triggering: $WF_NAME ($WF_ID)"
            gh workflow run "$WF_ID" --ref "$BRANCH"

            RUN_ID=""
            for i in $(seq 1 12); do
              sleep 5
              RUN_ID=$(gh run list --workflow "$WF_ID" --branch "$BRANCH" --event workflow_dispatch \
                --json databaseId,createdAt --limit 10 \
                --jq --arg ts "$TS" '[.[] | select(.createdAt >= $ts)] | .[0].databaseId // empty')
              [ -n "$RUN_ID" ] && break
            done

            if [ -z "$RUN_ID" ]; then
              echo "❌ Could not find run for workflow $WF_NAME"
              exit 1
            fi

            echo "   → run id: $RUN_ID"
            echo "$RUN_ID" >> run_ids.txt
          done < workflows.txt

      - name: Wait, download artifacts and normalize filenames
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -uo pipefail
          mkdir -p downloaded projects
          FAILED=0

          while read -r RUN_ID; do
            [ -z "${RUN_ID:-}" ] && continue
            echo "⏳ Waiting for run $RUN_ID..."

            if gh run watch "$RUN_ID" --interval 60 --exit-status >/dev/null 2>&1; then
              gh run download "$RUN_ID" --dir "downloaded/$RUN_ID" || true
            else
              echo "❌ Run $RUN_ID failed — artifacts skipped"
              FAILED=1
            fi
          done < run_ids.txt

          echo "🔤 Normalizing and copying installers to projects/"
          find downloaded -type f \( -iname '*.msi' -o -iname '*.deb' \) -print0 | \
          while IFS= read -r -d '' f; do
            base=$(basename "$f")
            lower=$(printf '%s' "$base" | tr '[:upper:]' '[:lower:]')
            cp "$f" "projects/$lower"
            echo "   $base → projects/$lower"
          done

          echo "FAILED=$FAILED" >> "$GITHUB_ENV"

      - name: Commit and push updated installers
        if: always()
        run: |
          set -euo pipefail
          git config user.name "Anderson Marlon"
          git config user.email "anderson18.marlon@gmail.com"

          if find projects -type f \( -iname '*.msi' -o -iname '*.deb' \) | grep -q .; then
            git add projects/

            if git diff --cached --quiet; then
              echo "✅ Nothing changed in projects/"
            else
              git commit -m "chore(projects): update installers [skip ci]"
              git push
              echo "✅ projects/ updated"
            fi
          else
            echo "⚠️ No installers found; skipping commit"
          fi

      - name: Fail job if any workflow failed
        if: env.FAILED == '1'
        run: exit 1